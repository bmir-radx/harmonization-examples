site_name: Harmonization Examples
site_description: A browsable guide to the harmonization framework, built from the examples.
docs_dir: docs

theme:
  name: material
  features:
    - navigation.instant
    - navigation.top
    - navigation.footer   # prev/next links at the page foot
    - content.code.copy   # copy button on code blocks
    - search.suggest
    - search.highlight
  palette:
    - scheme: default
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - scheme: slate
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode

plugins:
  - search
  - gen-files:
      scripts:
        - docs/gen_pages.py
  - literate-nav:
      nav_file: SUMMARY.md

markdown_extensions:
  - tables
  - admonition
  - toc:
      permalink: true
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
